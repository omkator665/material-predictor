<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Requirements</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:90%;
  max-width:420px;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

label{
  display:block;
  margin-top:12px;
  margin-bottom:5px;
  font-size:14px;
  color:#ccc;
  text-align:left;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:15px;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(90deg,#00e6ff,#00ff99);
  color:black;
}

button:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<div class="container">

<h1>Enter Requirements</h1>

<div class="card">

<label>Strength</label>
<select id="strength">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
</select>

<label>Weight Preference</label>
<select id="weight">
<option value="3">Light</option>
<option value="2">Medium</option>
<option value="1">Heavy OK</option>
</select>

<label>Budget</label>
<select id="cost">
<option value="3">Low Cost</option>
<option value="2">Medium</option>
<option value="1">High Budget</option>
</select>

<label>Corrosion Resistance</label>
<select id="corrosion">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
</select>

<label>Temperature Resistance</label>
<select id="temp">
<option value="1">Low</option>
<option value="2">Medium</option>
<option value="3">High</option>
</select>

<button onclick="calculate()">Analyze</button>

</div>
</div>

<script>
const materials=[
{name:"Steel",s:3,w:1,c:3,cor:1,t:3},
{name:"Aluminum",s:2,w:3,c:2,cor:3,t:2},
{name:"Titanium",s:3,w:3,c:1,cor:3,t:3},
{name:"Cast Iron",s:3,w:1,c:3,cor:1,t:2},
{name:"ABS Plastic",s:1,w:3,c:3,cor:3,t:1}
];

function calculate(){
let S=+strength.value,W=+weight.value,C=+cost.value,CR=+corrosion.value,T=+temp.value;

let results=materials.map(m=>{
return{name:m.name,score:(S*m.s+W*m.w+C*m.c+CR*m.cor+T*m.t)};
});

results.sort((a,b)=>b.score-a.score);

localStorage.setItem("results",JSON.stringify(results));
window.location.href="result.html";
}
</script>

</body>
</html>
