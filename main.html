<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Input</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#111;
  color:white;
}

.container{
  margin-top:50px;
}

input,select{
  padding:10px;
  margin:10px;
  border-radius:8px;
}

button{
  padding:10px 20px;
  background:#00e6ff;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">
<h2>Enter Requirements</h2>

<select id="strength">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="weight">
<option>Light</option>
<option>Medium</option>
<option>Heavy</option>
</select>

<select id="cost">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<br>
<button onclick="calculate()">Submit</button>
</div>

<script>
function calculate(){
  let s=document.getElementById("strength").value;
  let w=document.getElementById("weight").value;
  let c=document.getElementById("cost").value;

  let material="Steel";

  if(s=="High" && w=="Light") material="Aluminum";
  else if(s=="High" && c=="Low") material="Cast Iron";
  else if(w=="Light" && c=="High") material="Titanium";

  localStorage.setItem("result",material);
  window.location.href="result.html";
}
</script>

</body>
</html>
