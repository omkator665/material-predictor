<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
}
.container{
  width:90%;
  max-width:600px;
  margin:auto;
}
.card{
  background:rgba(255,255,255,0.08);
  margin:10px;
  padding:10px;
  border-radius:10px;
}
button{
  padding:10px;
  margin:5px;
  background:#00e6ff;
  border:none;
  border-radius:8px;
}
canvas{
  background:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>Top Results</h2>

<div id="list"></div>

<canvas id="chart"></canvas>

<br>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="back()">Back</button>

</div>

<script>
let data=JSON.parse(localStorage.getItem("results"));
let html="";

let labels=[],scores=[];

data.slice(0,3).forEach((m,i)=>{
html+=`<div class="card"><h3>#${i+1} ${m.name}</h3><p>Score: ${m.score}</p></div>`;
labels.push(m.name);
scores.push(m.score);
});

document.getElementById("list").innerHTML=html;

// Chart
new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:labels,
datasets:[{label:'Score',data:scores}]
}
});

// PDF
function downloadPDF(){
const {jsPDF} = window.jspdf;
let doc = new jsPDF();

// Title
doc.setFontSize(18);
doc.text("Smart Material Selection Report", 20, 20);

// Line
doc.setLineWidth(0.5);
doc.line(20, 25, 190, 25);

// Results
doc.setFontSize(12);

let y = 40;

data.slice(0,3).forEach((m,i)=>{
  doc.text(`${i+1}. ${m.name}`, 20, y);
  doc.text(`Score: ${m.score}`, 120, y);
  y += 10;
});

// Add Graph Image
let canvas = document.getElementById("chart");
let imgData = canvas.toDataURL("image/png");

// Add graph title
doc.text("Performance Graph", 20, y+10);

// Insert image
doc.addImage(imgData, 'PNG', 20, y+15, 160, 80);

// Footer
doc.setFontSize(10);
doc.text("Generated by Smart Material Selector", 20, 290);

// Save
doc.save("Material_Report.pdf");
}
function back(){
window.location.href="return.html";
}
</script>

</body>
</html>
