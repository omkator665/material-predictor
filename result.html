<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result</title>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43);
  color:white;
  text-align:center;
  margin:0;
}

.container{
  width:90%;
  max-width:600px;
  margin:auto;
}

.card{
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:15px;
  border-radius:12px;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#00e6ff;
  width:45%;
}

canvas{
  background:white;
  border-radius:10px;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>📊 Material Results</h2>

<div id="list"></div>

<canvas id="chart"></canvas>

<br>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="back()">Back</button>

</div>

<script>

// GET DATA
let data = JSON.parse(localStorage.getItem("results"));

// DISPLAY TOP 3
let html = "";
let labels = [];
let scores = [];

data.slice(0,3).forEach((m,i)=>{
  html += `
  <div class="card">
    <h3>#${i+1} ${m.name}</h3>
    <p>Score: ${m.score}</p>
  </div>`;

  labels.push(m.name);
  scores.push(m.score);
});

document.getElementById("list").innerHTML = html;

// CREATE CHART
let chart = new Chart(document.getElementById("chart"), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: 'Score',
      data: scores
    }]
  }
});

// PDF DOWNLOAD
function downloadPDF(){

const jsPDF = window.jspdf.jsPDF;
let doc = new jsPDF();

// TITLE
doc.setFontSize(18);
doc.text("Smart Material Selection Report", 20, 20);

// LINE
doc.line(20, 25, 190, 25);

// RESULTS
doc.setFontSize(12);
let y = 40;

data.slice(0,3).forEach((m,i)=>{
  doc.text(`${i+1}. ${m.name}`, 20, y);
  doc.text(`Score: ${m.score}`, 120, y);
  y += 10;
});

// WAIT FOR CHART RENDER
setTimeout(() => {

  let canvas = document.getElementById("chart");
  let imgData = canvas.toDataURL("image/png");

  doc.text("Performance Graph", 20, y+10);
  doc.addImage(imgData, 'PNG', 20, y+15, 160, 80);

  doc.setFontSize(10);
  doc.text("Generated by Smart Material Selector", 20, 290);

  doc.save("Material_Report.pdf");

}, 500);

}

// BACK
function back(){
  window.location.href = "return.html";
}

</script>

</body>
</html>
